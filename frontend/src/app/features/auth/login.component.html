<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-icon">👤</div>
      <h2>Quản Lý Nhân Viên</h2>
      <p>Đăng nhập để tiếp tục</p>
    </div>
 
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Nhập username"
          [class.is-invalid]="f['username'].invalid && f['username'].touched"
        />
        <div class="error-msg" *ngIf="f['username'].touched && f['username'].errors">
          <span *ngIf="f['username'].errors['required']">Username là bắt buộc</span>
          <span *ngIf="f['username'].errors['minlength']">Tối thiểu 3 ký tự</span>
        </div>
      </div>
 
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Nhập mật khẩu"
          [class.is-invalid]="f['password'].invalid && f['password'].touched"
        />
        <div class="error-msg" *ngIf="f['password'].touched && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Mật khẩu là bắt buộc</span>
          <span *ngIf="f['password'].errors['minlength']">Tối thiểu 6 ký tự</span>
        </div>
      </div>
 
      <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
 
      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Đăng nhập</span>
        <span *ngIf="loading">Đang xử lý...</span>
      </button>
    </form>
  </div>
</div>
